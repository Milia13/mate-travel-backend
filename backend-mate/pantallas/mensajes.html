<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mate & Travel - Mis Mensajes</title>
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="../styles.css">
    <!-- Theme loading script -->
    <script src="../js/theme.js"></script>
</head>

<body>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <aside class="col-lg-3 col-xl-2 bg-success-subtle border-end border-success-subtle min-vh-100 p-4 d-flex flex-column justify-content-between">
                <div>
                    <!-- Brand Logo -->
                    <div class="d-flex align-items-center gap-1 mb-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="text-success align-text-bottom me-1" viewBox="0 0 24 24">
                            <line x1="13" y1="7" x2="18" y2="2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M6 9c0-1.1.9-2 2-2h8c1.1 0 2 .9 2 2v3c0 4.4-3.6 7-8 7s-8-2.6-8-7V9zm2 .5H16V12c0 3.3-2.7 5-6 5s-6-1.7-6-5V9.5z" fill-rule="evenodd"/>
                        </svg>
                        <h3 class="fw-bold mb-0 fs-5"><span class="text-success">Mate</span> &amp; Travel</h3>
                    </div>

                    <p class="text-body-secondary small mb-4 lh-sm">
                        Compañeres de viaje,<br>
                        mejores recuerdos
                    </p>

                    <!-- Navigation Menu -->
                    <nav class="nav flex-column nav-pills gap-1">
                        <a href="inicio.html" class="nav-link text-body-secondary link-success py-2 px-3 rounded-3">
                            <i class="bi bi-compass me-2"></i> Explorar
                        </a>
                        <a href="perfil.html" class="nav-link text-body-secondary link-success py-2 px-3 rounded-3">
                            <i class="bi bi-person-circle me-2"></i> Mi Perfil
                        </a>
                        <a href="mensajes.html" class="nav-link active bg-success text-white py-2 px-3 rounded-3">
                            <i class="bi bi-chat-left-text me-2"></i> Compañeres y Mensajes
                        </a>

                        <a href="#" class="nav-link text-body-secondary link-success py-2 px-3 rounded-3 theme-toggle" id="btnThemeToggle">
                            <i class="bi bi-moon-fill me-2"></i> <span class="theme-toggle-text">Modo Oscuro</span>
                        </a>
                        <hr class="my-2 border-secondary opacity-25">
                        <a href="iniciar_sesion.html" class="nav-link text-danger link-danger py-2 px-3 rounded-3 mt-1 fw-semibold">
                            <i class="bi bi-box-arrow-right me-2"></i> Cerrar sesión
                        </a>
                    </nav>
                </div>
                
                <!-- Bottom Action -->
                <div>
                    <button class="btn btn-outline-success w-100 rounded-pill d-flex align-items-center justify-content-center gap-2 mt-4" id="themeToggleBtn">
                        <i class="bi bi-moon-stars"></i>
                        <span>Modo Noche</span>
                    </button>
                </div>
            </aside>

            <!-- MAIN CONTENT (MESSAGES) -->
            <main class="col-lg-9 col-xl-10 p-0 bg-body-tertiary d-flex flex-column min-vh-100">
                <div class="row g-0 flex-grow-1">
                    
                    <!-- Chat List (Left Column) -->
                    <div class="col-md-4 col-lg-3 vh-100 overflow-y-auto border-end border-light-subtle bg-body" id="chatListContainer">
                        <div class="p-3 border-bottom">
                            <h4 class="fw-bold mb-0">Mensajes</h4>
                        </div>
                        <div id="contactsList" class="list-group list-group-flush">
                            <!-- Contacts will be injected here -->
                            <div class="p-4 text-center text-body-secondary" id="noChatsMsg" class="p-4 text-center text-body-secondary d-none">
                                <i class="bi bi-chat-square-dots fs-1 mb-2 d-block"></i>
                                No tenés chats activos. ¡Hacé match en Explorar!
                            </div>
                        </div>
                    </div>

                    <!-- Active Chat (Right Column) -->
                    <div class="col-md-8 col-lg-9 vh-100 d-flex flex-column d-none" id="activeChatContainer">
                        <div class="p-3 border-bottom bg-body d-flex align-items-center gap-3">
                            <img src="" id="activeChatAvatar" class="rounded-circle object-fit-cover" width="45" height="45">
                            <div>
                                <h5 class="fw-bold mb-0" id="activeChatName">Nombre</h5>
                                <small class="text-success">En línea</small>
                            </div>
                        </div>
                        
                        <div  id="pageChatMessages" class="flex-grow-1 overflow-y-auto p-3 bg-body d-flex flex-column gap-2">
                            <!-- Messages will appear here -->
                            <div class="typing-indicator" id="pageTypingIndicator" class="typing-indicator d-none">
                                <div class="typing-dot"></div>
                                <div class="typing-dot"></div>
                                <div class="typing-dot"></div>
                            </div>
                        </div>

                        <div class="p-3 bg-body border-top">
                            <form id="pageChatForm" class="d-flex gap-2">
                                <button type="button" class="btn btn-light rounded-circle text-success">
                                    <i class="bi bi-paperclip"></i>
                                </button>
                                <input type="text" class="form-control rounded-pill shadow-none border-secondary-subtle" placeholder="Escribí un mensaje..." id="pageChatInput">
                                <button type="submit" class="btn btn-success rounded-circle d-flex align-items-center justify-content-center shadow-sm">
                                    <i class="bi bi-send-fill"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                    
                    <!-- Empty State -->
                    <div class="col-md-8 col-lg-9 vh-100 d-flex flex-column" id="emptyStateContainer">
                        <div class="d-flex flex-column align-items-center justify-content-center h-100 text-body-secondary">
                            <i class="bi bi-chat-dots text-success opacity-50"></i>
                            <h4 class="mt-3 text-body-secondary">Seleccioná un chat para comenzar</h4>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="../js/chat.js"></script>
    <script src="../js/mensajes.js"></script>
</body>

</html>
